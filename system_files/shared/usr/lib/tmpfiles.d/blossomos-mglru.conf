# Ensure MGLRU is fully enabled and protect ~1s of the working set from
# reclaim under memory pressure, so foreground apps (Plasma, the active
# window) stay responsive instead of thrashing before the OOM killer acts.
w /sys/kernel/mm/lru_gen/enabled - - - - 7
w /sys/kernel/mm/lru_gen/min_ttl_ms - - - - 1000
