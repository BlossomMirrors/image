name: blossomos-dx-nvidia-open
description: BlossomOS Developer Experience + NVIDIA open driver variant
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:
  # Install RPM packages, repos, and COPR packages
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 01-packages.sh

  # Install kernel from main akmods + kernel modules
  - type: akmods
    base: main
    install:
      - xone
      - openrazer
      - v4l2loopback

  # Install NVIDIA open drivers
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
      - "rpm-ostree install akmod-nvidia-open xorg-x11-drv-nvidia-cuda"
      - "rpm-ostree kargs --append=rd.driver.blacklist=nouveau --append=modprobe.blacklist=nouveau --append=nvidia-drm.modeset=1"

  # Copy shared system configuration files into the image
  - type: files
    files:
      - source: system
        destination: /

  # Install developer tools: Docker, VSCode, QEMU/libvirt, COPR dev packages
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 00-dx.sh

  # Download external assets: starship, nerdfonts, flatpak preinstalls, etc.
  - type: script
    scripts:
      - 03-fetch.sh

  # Add BlossomOS-specific RPM packages and Flatpak remote
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 04-blossomos.sh

  # NVIDIA post-install: remove nouveau icd, add libnvidia-ml.so symlink, kargs
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 04-nvidia.sh

  # Override installs: remove chsh, compile gschemas, Samba setup
  - type: script
    scripts:
      - 16-override-install.sh

  # Enable/disable systemd units and clean up repo files
  - type: script
    scripts:
      - 17-cleanup.sh

  # Write os-release branding and image-info.json
  - type: script
    scripts:
      - 18-image-info.sh

  # Install Flatpak applications via systemd service on boot
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.libreoffice.LibreOffice
          - org.mozilla.Thunderbird
          - org.gimp.GIMP
          - org.videolan.VLC
          - net.displaycal.DisplayCAL
          - it.mijorus.gearlever
          - io.github.nokse22.Exhibit
          - org.kde.kclock
          - org.qbittorrent.qBittorrent
          - com.rustdesk.RustDesk
          - org.kde.knights
          - org.kde.kpat
          - org.kde.kmahjongg
          - org.kde.kmines
      - scope: system
        repo:
          name: blossomos
          url: https://repo.blossomos.org/blossomos.flatpakrepo
          title: BlossomOS
        install:
          - net.imput.helium

  # Rebuild initramfs for the installed kernel
  - type: script
    scripts:
      - 19-initramfs.sh
