name: blossomos-nvidia-open
description: BlossomOS NVIDIA open kernel module variant
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:
  # Install RPM packages, repos, and COPR packages
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 01-packages.sh

  # Install kernel from main akmods + kernel modules
  - type: akmods
    base: main
    install:
      - xone
      - openrazer
      - v4l2loopback

  # Wrap semodule so sandbox errors don't abort the build.
  # In an ostree/bootc container build /sys/fs/selinux is not mounted, so
  # semodule cannot load policy into a running kernel anyway.  libsemanage uses
  # hardlinks to build its sandbox and this fails with EEXIST on overlay
  # filesystems regardless of whether we pre-clean /etc/selinux/targeted/tmp.
  # The .pp file is on disk; the real module load happens on first boot.
  # NOTE: exec is intentionally absent so the shell can catch the exit code.
  - type: script
    snippets:
      - |
        rm -rf /etc/selinux/targeted/tmp
        mv /usr/sbin/semodule /usr/sbin/semodule.real
        printf '#!/bin/bash\nrm -rf /etc/selinux/targeted/tmp\n/usr/sbin/semodule.real "$@" || true\n' > /usr/sbin/semodule
        chmod +x /usr/sbin/semodule

  # Install NVIDIA open kernel module and userspace drivers via akmods module
  - type: akmods
    base: main
    nvidia-driver: nvidia-open
    install: []

  # Restore real semodule after NVIDIA akmods
  - type: script
    snippets:
      - "[ -f /usr/sbin/semodule.real ] && mv /usr/sbin/semodule.real /usr/sbin/semodule || true"

  # Copy shared system configuration files into the image
  - type: files
    files:
      - source: system
        destination: /

  # Download external assets: starship, nerdfonts, flatpak preinstalls, etc.
  - type: script
    scripts:
      - 03-fetch.sh

  # Add BlossomOS-specific RPM packages and Flatpak remote
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 04-blossomos.sh

  # NVIDIA post-install: remove nouveau icd, add libnvidia-ml.so symlink, kargs
  - type: script
    snippets:
      - "mv /etc/selinux/targeted/active /etc/selinux/targeted/active.bak && mv /etc/selinux/targeted/active.bak /etc/selinux/targeted/active"
    scripts:
      - 04-nvidia.sh

  # Override installs: remove chsh, compile gschemas, Samba setup
  - type: script
    scripts:
      - 16-override-install.sh

  # Enable/disable systemd units and clean up repo files
  - type: script
    scripts:
      - 17-cleanup.sh

  # Write os-release branding and image-info.json
  - type: script
    scripts:
      - 18-image-info.sh

  # Install Flatpak applications via systemd service on boot
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - org.libreoffice.LibreOffice
          - org.mozilla.Thunderbird
          - org.gimp.GIMP
          - org.videolan.VLC
          - net.displaycal.DisplayCAL
          - io.github.nokse22.Exhibit
          - org.kde.kclock
          - org.qbittorrent.qBittorrent
          - com.rustdesk.RustDesk
          - org.kde.knights
          - org.kde.kpat
          - org.kde.kmahjongg
          - org.kde.kmines
          - org.kde.gwenview
          - org.kde.kalk
          - org.kde.kweather
      - scope: system
        repo:
          name: blossomos
          url: https://repo.blossomos.org/blossomos.flatpakrepo
          title: BlossomOS
        install:
          - net.imput.helium
          - runtime/org.kde.KStyle.BlossomUI/x86_64/6.9
          - runtime/org.kde.KStyle.BlossomUI/x86_64/5.15-24.08

  - type: os-release
    properties:
      ID: blossomos
      NAME: BlossomOS
      PRETTY_NAME: BlossomOS

  # Rebuild initramfs for the installed kernel
  - type: script
    scripts:
      - 19-initramfs.sh
