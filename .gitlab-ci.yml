stages:
  - build

variables:
  BLOSSOM_REPO_URL: "https://repo.blossomos.org/rpm/"
  BUILDAH_ISOLATION: rootless
  STORAGE_DRIVER: overlay
  STORAGE_OPTS: "overlay.mount_program=/usr/bin/fuse-overlayfs"
  COSIGN_PASSWORD: ""
  GITHUB_TOKEN: ""
  BB_CACHE_LAYERS: "true"

.build_base:
  stage: build
  tags:
    - bigboi
  image: ghcr.io/ublue-os/devcontainer:latest
  before_script:
    - buildah rm --all 2>/dev/null || true
    - buildah unshare -- sh -c 'rm -rf /var/tmp/buildah*' 2>/dev/null || true
    - curl -fsSL https://raw.githubusercontent.com/blue-build/cli/main/install.sh | bash
    - echo "$CI_REGISTRY_PASSWORD" | podman login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - echo "$CI_REGISTRY_PASSWORD" | cosign login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

# latest (main branch + schedule + manual)

build-base-latest:
  extends: .build_base
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH != "prerelease" && $CI_COMMIT_BRANCH != "release" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
  script:
    - bluebuild build --push --no-sign recipes/recipe.yml
    - podman tag localhost/blossomos:latest $CI_REGISTRY_IMAGE:latest
    - podman push $CI_REGISTRY_IMAGE:latest --digestfile /tmp/digest.txt
    - cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$CI_REGISTRY_IMAGE:latest@$(cat /tmp/digest.txt)"

